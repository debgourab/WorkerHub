<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Worker | Workers Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav container" aria-label="Primary navigation">
      <a class="brand" href="index.html"><img src="assets/icons/logo.png" alt="" class="brand-icon"><span>Workers</span><span class="deb">Hub</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">☰</button>
      <div class="nav-links" data-nav-links>
        <a href="workers.html">Find Workers</a>
        <a href="customer-dashboard.html">Dashboard</a>
        <a href="login.html">Log In</a>
      </div>
    </nav>
  </header>

  <main class="page">
    <section class="container form-layout">
      <div>
        <p class="eyebrow">Booking request</p>
        <h1>Tell the worker what you need</h1>
        <p class="muted">Send a clear request with date, location, and job details. The worker can confirm from their dashboard.</p>
      </div>
      <form class="form-card" id="booking-form">
        <input type="hidden" id="worker-id">
        <label>Selected worker <input id="worker-name" type="text" readonly></label>
        <label>Service <input id="service-name" type="text" readonly></label>
        <label>Your name <input id="customer-name" type="text" required placeholder="Full name"></label>
        <label>Phone <input id="customer-phone" type="tel" required placeholder="+91 98765 43210"></label>
        <label>Address <input id="job-address" type="text" required placeholder="House, street, area"></label>
        <div class="form-row">
          <label>Date <input id="job-date" type="date" required></label>
          <label>Time <input id="job-time" type="time" required></label>
        </div>
        <label>Job details <textarea id="job-details" required placeholder="Describe the issue or work needed"></textarea></label>
        <button class="btn" type="submit">Send Booking Request</button>
        <p class="form-message" id="booking-message" role="status"></p>
      </form>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/data.js"></script>
  <script src="js/booking.js"></script>
</body>
</html>
