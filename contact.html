<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Workers Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav container" aria-label="Primary navigation">
      <a class="brand" href="index.html"><img src="assets/icons/logo.png" alt="" class="brand-icon"><span>Workers</span><span class="deb">Hub</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">☰</button>
      <div class="nav-links" data-nav-links><a href="workers.html">Find Workers</a><a href="about.html">About</a><a class="active" href="contact.html">Contact</a><a href="login.html">Log In</a></div>
    </nav>
  </header>
  <main class="page">
    <section class="container form-layout">
      <div><p class="eyebrow">Contact</p><h1>We are here to help</h1><p class="muted">Send a message about bookings, worker verification, or marketplace support.</p></div>
      <form class="form-card" id="contact-form">
        <label>Name <input type="text" required placeholder="Your name"></label>
        <label>Email <input type="email" required placeholder="you@example.com"></label>
        <label>Message <textarea required placeholder="How can we help?"></textarea></label>
        <button class="btn" type="submit">Send Message</button>
        <p class="form-message" role="status"></p>
      </form>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
