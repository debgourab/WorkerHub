<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Dashboard | Worker Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav container" aria-label="Primary navigation">
      <a class="brand" href="index.html"><img src="assets/icons/logo.png" alt="" class="brand-icon"><span>Worker</span><span class="deb">Hub</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">☰</button>
      <div class="nav-links" data-nav-links>
        <a href="workers.html">Find Workers</a>
        <a href="customer-dashboard.html">Customer Dashboard</a>
        <a class="active" href="worker-dashboard.html">Worker Dashboard</a>
      </div>
    </nav>
  </header>
  <main class="page dashboard container">
    <section class="dashboard-head">
      <div><p class="eyebrow">Worker workspace</p><h1>Jobs and earnings</h1></div>
      <button class="btn" type="button" id="availability-toggle">Available Today</button>
    </section>
    <section class="metrics">
      <div><strong>₹8,400</strong><span>This week</span></div>
      <div><strong>6</strong><span>Open requests</span></div>
      <div><strong>4.9</strong><span>Profile rating</span></div>
    </section>
    <section class="dashboard-grid">
      <div class="panel"><h2>Incoming jobs</h2><div id="worker-jobs"></div></div>
      <div class="panel"><h2>Profile checklist</h2><div class="checklist"><label><input type="checkbox" checked> Identity verified</label><label><input type="checkbox" checked> Skills listed</label><label><input type="checkbox"> Add portfolio photos</label></div></div>
    </section>
  </main>
  <script src="js/app.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
