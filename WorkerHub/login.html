<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | Worker Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <a class="brand" href="index.html"><img src="assets/icons/logo.png" alt="" class="brand-icon"><span>Worker</span><span class="deb">Hub</span></a>
    <form class="form-card auth-card" id="login-form">
      <h1>Log in</h1>
      <label>Email <input type="email" id="login-email" required placeholder="you@example.com"></label>
      <label>Password <input type="password" id="login-password" required placeholder="Password"></label>
      <button class="btn" type="submit">Log In</button>
      <p class="form-message" id="auth-message" role="status"></p>
      <p class="muted">New to Worker Hub? <a href="register.html">Create an account</a></p>
    </form>
  </main>
  <script src="js/auth.js"></script>
</body>
</html>
