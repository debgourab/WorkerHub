<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Dashboard | Workers Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="site-header">
    <nav class="nav container" aria-label="Primary navigation">
      <a class="brand" href="index.html"><img src="assets/icons/logo.png" alt="" class="brand-icon"><span>Workers</span><span class="deb">Hub</span></a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false">☰</button>
      <div class="nav-links" data-nav-links>
        <a href="workers.html">Find Workers</a>
        <a class="active" href="customer-dashboard.html">Customer Dashboard</a>
        <a href="worker-dashboard.html">Worker Dashboard</a>
      </div>
    </nav>
  </header>
  <main class="page dashboard container">
    <section class="dashboard-head">
      <div><p class="eyebrow">Customer workspace</p><h1>Your bookings</h1></div>
      <a class="btn" href="workers.html">Book Another Worker</a>
    </section>
    <section class="metrics">
      <div><strong>3</strong><span>Active requests</span></div>
      <div><strong>12</strong><span>Completed jobs</span></div>
      <div><strong>4.8</strong><span>Average rating given</span></div>
    </section>
    <section class="dashboard-grid">
      <div class="panel"><h2>Current requests</h2><div id="customer-bookings"></div></div>
      <div class="panel"><h2>Recommended workers</h2><div id="recommended-workers"></div></div>
    </section>
  </main>
  <script src="js/app.js"></script>
  <script src="js/data.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
